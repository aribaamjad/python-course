<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - AI Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav>

<div class="logo">
    <img src="{{ url_for('static', filename='favicon.png') }}" alt="AI Hub Logo">
    <span>AI Hub</span>
</div>

<ul>
<li><a href="/">Home</a></li>
<li><a href="/tools">AI Tools</a></li>
<li><a href="/about">About</a></li>
<li><a href="/contact">Contact</a></li>
<li><a href="/login">Login</a></li>
</ul>

</nav>

<section class="hero">

<h1>Create Account 🚀</h1>

<p>Join AI Hub and discover the best AI tools.</p>

<form method="POST" class="contact-form">

<input
type="text"
name="name"
placeholder="Full Name"
required>

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Create Account
</button>

</form>

<p style="margin-top:20px;">
Already have an account?
<a href="/login">Login Here</a>
</p>

</section>

</body>
</html>
