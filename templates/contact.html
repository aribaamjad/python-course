<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact - AI Hub</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<!-- NAVBAR -->

<nav>

<div class="logo">
    <img src="{{ url_for('static', filename='favicon.png') }}" alt="AI Hub Logo">
    <span>AI Hub</span>
</div>

<ul>

<li><a href="/">Home</a></li>
<li><a href="/tools">AI Tools</a></li>
<li><a href="/about">About</a></li>
<li><a href="/contact">Contact</a></li>

</ul>

</nav>

<!-- CONTACT -->

<section class="hero">

<h1>Contact Us</h1>

<p>
Have any questions or suggestions? Send us a message.
</p>

{% if success %}

<p style="color:lime;font-size:20px;margin-top:20px;">
✅ Message Sent Successfully!
</p>

{% endif %}

<form action="/contact" method="POST" style="max-width:600px;margin:40px auto;display:flex;flex-direction:column;gap:20px;">

<input
type="text"
name="name"
placeholder="Your Name"
required
style="padding:15px;border-radius:10px;border:none;">

<input
type="email"
name="email"
placeholder="Your Email"
required
style="padding:15px;border-radius:10px;border:none;">

<textarea
name="message"
rows="6"
placeholder="Your Message"
required
style="padding:15px;border-radius:10px;border:none;"></textarea>

<button
type="submit"
style="padding:15px;background:#2563eb;color:white;border:none;border-radius:10px;font-size:18px;cursor:pointer;">

Send Message

</button>

</form>

</section>

<footer>

<p>
© 2026 AI Hub | Built with Python Flask ❤️
</p>

</footer>

</body>

</html>
